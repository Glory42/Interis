<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/theme-registry.js"></script>
    <script>
      (function () {
        var storageKey = "tic-theme-id";
        var registry = window.__THIS_IS_CINEMA_THEME_REGISTRY__ || {};
        var configuredDefault = window.__THIS_IS_CINEMA_DEFAULT_THEME_ID__;
        var fallbackThemeId =
          typeof configuredDefault === "string"
            ? configuredDefault.toLowerCase()
            : "rose-pine";

        var resolveThemeId = function (rawThemeId) {
          if (typeof rawThemeId === "string") {
            var normalizedThemeId = rawThemeId.trim().toLowerCase();
            if (registry[normalizedThemeId]) {
              return normalizedThemeId;
            }
          }

          if (registry["rose-pine"]) {
            return "rose-pine";
          }

          if (fallbackThemeId && registry[fallbackThemeId]) {
            return fallbackThemeId;
          }

          var firstThemeId = Object.keys(registry)[0];
          return firstThemeId || "rose-pine";
        };

        var rawStoredThemeId = null;
        try {
          rawStoredThemeId = window.localStorage.getItem(storageKey);
        } catch (_error) {
          rawStoredThemeId = null;
        }

        var themeId = resolveThemeId(rawStoredThemeId);
        var theme = registry[themeId];
        if (theme && theme.tokens) {
          var root = document.documentElement;
          var entries = Object.entries(theme.tokens);
          for (var i = 0; i < entries.length; i += 1) {
            root.style.setProperty(entries[i][0], entries[i][1]);
          }
          root.dataset.themeId = themeId;
        }

        try {
          window.localStorage.setItem(storageKey, themeId);
        } catch (_error) {
          // no-op: private mode/storage disabled
        }
      })();
    </script>
    <title>NULL://LOG</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
